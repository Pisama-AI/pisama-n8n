# Self-host Pisama for n8n.
#   cd deploy && PISAMA_API_KEY=your-key docker compose up --build
# With the dashboard:
#   cd deploy && PISAMA_API_KEY=your-key docker compose --profile ui up --build
#
# The build context is the repo root (..) so the image can see engine/ + server/.
# The dashboard lives behind the "ui" profile so the default `docker compose up`
# runs just the detection server.
services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
      args:
        PISAMA_BUILD_REVISION: ${PISAMA_BUILD_REVISION:-unknown}
    image: pisama-n8n-server
    ports:
      - "${PISAMA_SERVER_PORT:-8400}:8400"
    environment:
      - PISAMA_API_KEY=${PISAMA_API_KEY:-}
      # Optional separate secret for the community node's HMAC signatures
      # (the node's "Webhook Secret" credential field). Defaults to the API key.
      - PISAMA_WEBHOOK_SECRET=${PISAMA_WEBHOOK_SECRET:-}
      # SQLite by default; point at Postgres for a durable multi-process deploy.
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/pisama.db}
    volumes:
      - pisama_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8400/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dashboard on :3000. NEXT_PUBLIC_API_BASE is baked into the browser bundle at
  # BUILD time and must be the server URL as the BROWSER sees it (host-published
  # :8400 by default, matching the port mapping above).
  dashboard:
    profiles: ["ui"]
    build:
      context: ../dashboard
      args:
        NEXT_PUBLIC_API_BASE: ${PISAMA_DASHBOARD_API_BASE:-http://localhost:8400}
    ports:
      - "3000:3000"

volumes:
  pisama_data:
