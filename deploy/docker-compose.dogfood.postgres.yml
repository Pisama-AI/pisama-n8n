# Postgres variant for deploy/docker-compose.dogfood.yml. Use with the base file:
# docker compose -p pisama-n8n-dogfood-pg \
#   -f deploy/docker-compose.dogfood.yml \
#   -f deploy/docker-compose.dogfood.postgres.yml up -d n8n postgres
services:
  n8n:
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=dogfood-only-postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=dogfood-only-postgres
    volumes:
      - dogfood_n8n_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 3s
      retries: 24

volumes:
  dogfood_n8n_postgres:
