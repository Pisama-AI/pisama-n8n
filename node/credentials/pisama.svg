<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Pisama">
  <!-- Paper-dark rounded square -->
  <rect width="32" height="32" rx="6" ry="6" fill="#0E0F0D"/>
  <!-- Ink outline ring (drops out at 16px, but reads at 32px+) -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#F2EDE1" stroke-width="1.6" opacity="0.9"/>
  <!-- The freckle — solid amber dot, top-right of the ring -->
  <circle cx="20.5" cy="12.5" r="2.6" fill="#E8B341"/>
</svg>
