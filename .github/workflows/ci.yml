name: CI

# Quality gates for the fair-code pisama-n8n stack. Test-only: this workflow never
# deploys (the dashboard deploys via Vercel's own git integration; the server/engine
# are released manually). Safe to run on every push and PR.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  engine-server:
    name: engine parity + server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install engine + server (with test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e "engine[test]"
          pip install -e "server[test,mcp]"
      - name: Product capability contract
        run: python scripts/product_capabilities.py
      - name: Engine tests
        working-directory: engine
        run: python -m pytest -q --cov=pisama_n8n_engine --cov-report=term --cov-fail-under=60
      - name: Parity / regression gate (engine vs golden corpus)
        run: python benchmarks/parity_check.py
      - name: Server tests
        working-directory: server
        run: python -m pytest -q --cov=pisama_n8n_server --cov-report=term --cov-fail-under=80

  dashboard:
    name: dashboard typecheck + build + e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Install self-host server for real browser flow
        run: |
          python -m pip install --upgrade pip
          pip install -e engine -e server
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Typecheck
        working-directory: dashboard
        run: npx tsc --noEmit
      - name: Build (self-hosted mode)
        working-directory: dashboard
        run: npm run build
      - name: Install Playwright browser
        working-directory: dashboard
        run: npx playwright install --with-deps chromium
      - name: E2E (public SaaS journey + real self-host server and SQLite)
        working-directory: dashboard
        run: npm run test:e2e
