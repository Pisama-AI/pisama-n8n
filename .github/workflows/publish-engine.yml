name: Publish engine to PyPI

on:
  push:
    tags:
      - "engine-v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e "engine[test]"
      - run: python -m pytest -q
        working-directory: engine

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#engine-v}"
          PACKAGE_VERSION=$(grep -m1 '^version = ' engine/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          test "$TAG_VERSION" = "$PACKAGE_VERSION"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: engine
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: engine/dist/
