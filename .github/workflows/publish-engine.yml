name: Publish engine to PyPI

on:
  push:
    tags:
      - "engine-v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e "engine[test]"
      - run: python -m pytest -q
        working-directory: engine

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#engine-v}"
          PACKAGE_VERSION=$(grep -m1 '^version = ' engine/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          test "$TAG_VERSION" = "$PACKAGE_VERSION"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: engine
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: engine/dist/
